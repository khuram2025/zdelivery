name: zdelivery
description: "Professional Delivery Agent Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # HTTP & API
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Location & Maps
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0

  # Image & Camera
  image_picker: ^1.1.2

  # Signature
  signature: ^5.5.0

  # Charts
  fl_chart: ^0.69.2

  # Utils
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1

  # Routing
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
